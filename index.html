<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mélanie Dupriez | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #FDFBFB; --text: #1A1A1A; }
        .dark { --bg: #0A0A0A; --text: #FAFAFA; }
        body { background-color: var(--bg); color: var(--text); transition: background 0.6s ease; font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Cormorant Garamond', serif; }
        /* Effet Glass Menu */
        .glass-nav { background: rgba(255, 255, 255, 0.5); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .dark .glass-nav { background: rgba(0, 0, 0, 0.5); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .reveal { opacity: 0; transform: translateY(20px); transition: all 1s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>

    <!-- Nav -->
    <nav class="fixed top-0 w-full z-50 glass-nav px-10 py-6 flex justify-between items-center transition-all">
        <span class="text-xl tracking-[0.2em] uppercase font-light">Mélanie Dupriez</span>
        <div class="flex gap-10 text-[11px] font-bold uppercase tracking-[0.3em]">
            <a href="#projets" class="hover:opacity-60 transition">Projets</a>
            <a href="#parcours" class="hover:opacity-60 transition">Parcours</a>
            <button onclick="changeLang()" id="langBtn" class="hover:opacity-60 transition underline underline-offset-4">FR</button>
            <button onclick="document.documentElement.classList.toggle('dark')" class="hover:opacity-60 transition">THEME</button>
        </div>
    </nav>

    <!-- Header -->
    <header class="h-screen flex flex-col justify-center items-center text-center px-6">
        <h1 id="title" class="text-[clamp(3rem,8vw,7rem)] leading-tight mb-4">Business Data Analyst</h1>
        <p id="subtitle" class="text-sm uppercase tracking-[0.4em] opacity-60">Visual Storytelling & Strategy</p>
    </header>

    <script>
        // Logique de langue
        const content = {
            'FR': { title: 'Business Data Analyst', sub: 'Visual Storytelling & Strategy' },
            'EN': { title: 'Business Data Analyst', sub: 'Visual Storytelling & Strategy' },
            'NL': { title: 'Business Data Analist', sub: 'Visuele Storytelling & Strategie' }
        };

        function changeLang() {
            const btn = document.getElementById('langBtn');
            const langs = ['FR', 'EN', 'NL'];
            let next = (langs.indexOf(btn.innerText) + 1) % langs.length;
            btn.innerText = langs[next];
            
            document.getElementById('title').innerText = content[langs[next]].title;
            document.getElementById('subtitle').innerText = content[langs[next]].sub;
        }

        // Observer pour apparition
        const observer = new IntersectionObserver((e) => { 
            e.forEach(entry => { if(entry.isIntersecting) entry.target.classList.add('active'); }); 
        });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>
</html>
