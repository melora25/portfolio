<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mélanie Dupriez | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Inter:wght@200;300;400&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #FFF2F0; --text: #2D1D20; }
        .dark { --bg: #0f0f0f; --text: #e5e5e5; }
        body { background-color: var(--bg); color: var(--text); transition: all 0.5s ease; font-family: 'Inter', sans-serif; }
        h1, h2, h3, h4 { font-family: 'Cormorant Garamond', serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="py-12 px-6">

    <!-- Navigation Chic -->
    <nav class="max-w-6xl mx-auto flex justify-between items-center mb-24">
        <span class="text-2xl font-serif tracking-tighter">MD.</span>
        <div class="flex items-center gap-8 text-xs uppercase tracking-[0.2em]">
            <!-- Sélecteur Langue -->
            <div class="group relative cursor-pointer">
                <span>🌐 EN / FR / NL</span>
            </div>
            <!-- Toggle Mode Sombre -->
            <button onclick="document.documentElement.classList.toggle('dark')" class="hover:opacity-50 transition">
                ☾
            </button>
        </div>
    </nav>

    <!-- Hero Section -->
    <main class="max-w-3xl mx-auto text-center mb-32">
        <h1 class="text-8xl mb-8 font-light">Mélanie Dupriez</h1>
        <p class="text-xl font-light italic opacity-70">Business Data Analyst & Visual Storyteller</p>
    </main>

    <!-- Section Parcours (Esthétique) -->
    <section class="max-w-4xl mx-auto mb-32">
        <h3 class="text-5xl mb-16 text-center italic">Parcours</h3>
        <div class="grid gap-12">
            <div class="border-t border-current pt-8 flex justify-between">
                <span>Master Ingénieur de Gestion</span>
                <span class="opacity-50">2024 — 2026</span>
            </div>
            <div class="border-t border-current pt-8 flex justify-between">
                <span>Photographie Freelance</span>
                <span class="opacity-50">4 ans d'expérience</span>
            </div>
        </div>
    </section>

    <!-- Script pour le halo (on le garde car il est chic) -->
    <div id="halo" class="fixed w-[600px] h-[600px] rounded-full pointer-events-none opacity-[0.03] dark:opacity-[0.08] transition-all duration-700" style="background: radial-gradient(circle, #7A1C36 0%, transparent 70%); transform: translate(-50%, -50%); z-index: -1;"></div>

    <script>
        document.addEventListener('mousemove', (e) => {
            const halo = document.getElementById('halo');
            halo.style.left = e.clientX + 'px';
            halo.style.top = e.clientY + 'px';
        });
    </script>
</body>
</html>
