<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Reveal Corrigé</title>
    
    <!-- Chargement de Tailwind et de la police -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    
    <style>
        .serif { 
            font-family: 'Playfair Display', serif; 
        }
        
        /* 1. CORRECTION CSS : Espace pour les accents (é) et jambages (j, g, p) */
        .text-reveal-word { 
            display: inline-block; 
            overflow: hidden; 
            vertical-align: bottom; 
            padding-top: 0.2em;
            padding-bottom: 0.25em;
            margin-top: -0.2em;
            margin-bottom: -0.25em;
        }
        
        /* Style pour l'animation des lettres/mots */
        .text-reveal-char {
            display: inline-block;
            transform: translateY(100%);
            transition: transform 0.8s cubic-bezier(0.77, 0, 0.175, 1);
        }
        
        /* Classe ajoutée pour déclencher l'apparition */
        .is-revealed .text-reveal-char {
            transform: translateY(0);
        }
    </style>
</head>
<body class="bg-slate-50 flex items-center justify-center h-screen">

    <!-- Conteneur où le texte sera injecté -->
    <div id="text-container" class="text-5xl text-center text-slate-800"></div>

    <script>
        const container = document.getElementById('text-container');
        const textLine1 = "Le design est un voyage";
        const textLine2 = "particulièrement élégant"; // "p", "é", "g" pour tester les coupures

        function triggerTextReveal() {
            container.innerHTML = ''; 

            // 2. CORRECTION JS : Création de la ligne 1 (Retrait de overflow-hidden)
            const div1 = document.createElement('div');
            div1.className = "block font-bold"; 
            
            textLine1.split(' ').forEach((word) => {
                const wordSpan = document.createElement('span');
                wordSpan.className = "text-reveal-word mr-3"; // mr-3 = espace entre les mots
                
                const charSpan = document.createElement('span');
                charSpan.className = "text-reveal-char";
                charSpan.textContent = word;
                
                wordSpan.appendChild(charSpan);
                div1.appendChild(wordSpan);
            });

            // 2. CORRECTION JS : Création de la ligne 2 (Retrait de overflow-hidden)
            const div2 = document.createElement('div');
            div2.className = "block serif italic font-normal mt-2"; 
            
            textLine2.split(' ').forEach((word) => {
                const wordSpan = document.createElement('span');
                wordSpan.className = "text-reveal-word mr-3"; 
                
                const charSpan = document.createElement('span');
                charSpan.className = "text-reveal-char";
                charSpan.textContent = word;
                
                wordSpan.appendChild(charSpan);
                div2.appendChild(wordSpan);
            });

            // Ajout des lignes au conteneur
            container.appendChild(div1);
            container.appendChild(div2);

            // Gestion du délai d'apparition en cascade pour chaque mot
            const chars = container.querySelectorAll('.text-reveal-char');
            chars.forEach((char, index) => {
                char.style.transitionDelay = `${index * 0.1}s`;
            });

            // Déclenchement de l'animation
            setTimeout(() => {
                container.classList.add('is-revealed');
            }, 100);
        }

        // Lancer la fonction
        triggerTextReveal();
    </script>
</body>
</html>
