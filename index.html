<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mélanie Dupriez — Portfolio</title>
<meta name="description" content="Portfolio de Mélanie Dupriez, Business Data Analyst spécialisée en Business Intelligence, structuration de données et interfaces décisionnelles.">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FDFBFB;
  --text: #1C1417;
  --text-muted: #7C6E74;
  --line: rgba(28, 20, 23, 0.08);
  --accent: #DDA0AD;
  --nav-bg: rgba(253, 251, 251, 0.75);
}
.dark {
  --bg: #0B0809;
  --text: #F3ECEF;
  --text-muted: #9E8E94;
  --line: rgba(243, 236, 239, 0.08);
  --accent: #E5A9B7;
  --nav-bg: rgba(11, 8, 9, 0.75);
}

body {
  background-color: var(--bg);
  color: var(--text);
  font-family: 'Plus Jakarta Sans', sans-serif;
  transition: background-color 0.8s cubic-bezier(0.16, 1, 0.3, 1), color 0.8s cubic-bezier(0.16, 1, 0.3, 1);
  overflow-x: hidden;
}

@media (min-width: 1024px) {
  #custom-cursor {
    width: 8px;
    height: 8px;
    background-color: var(--text);
    border-radius: 50%;
    position: fixed;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 9999;
    transition: width 0.3s ease, height 0.3s ease, background-color 0.3s ease;
  }
  #custom-cursor-ring {
    width: 40px;
    height: 40px;
    border: 1px solid var(--line);
    border-radius: 50%;
    position: fixed;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 9998;
    transition: transform 0.08s ease-out, width 0.3s ease, height 0.3s ease, border-color 0.3s ease;
  }
  .hover-active #custom-cursor {
    width: 4px;
    height: 4px;
    background-color: var(--accent);
  }
  .hover-active #custom-cursor-ring {
    width: 55px;
    height: 55px;
    border-color: var(--accent);
  }
  a, button, input, textarea, .project-row, .lang-btn, .burger-btn, .card-interactive {
    cursor: none !important;
  }
  body {
    cursor: none;
  }
}

.serif { font-family: 'Playfair Display', serif; }

.hover-link {
  position: relative;
  transition: color 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}
.hover-link::after {
  content: '';
  position: absolute;
  width: 100%;
  transform: scaleX(0);
  height: 1px;
  bottom: -3px;
  left: 0;
  background-color: var(--accent);
  transform-origin: bottom right;
  transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
}
.hover-link:hover::after {
  transform: scaleX(1);
  transform-origin: bottom left;
}

.project-row {
  border-bottom: 1px solid var(--line);
  transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  position: relative;
}
.project-row::before {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 0;
  width: 100%;
  height: 1px;
  background-color: var(--accent);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
}
.project-row:hover::before { transform: scaleX(1); }
.project-row:hover { padding-left: 16px; color: var(--accent); }

#menu-overlay {
  opacity: 0;
  visibility: hidden;
  transform: translateY(-10px);
  transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1), transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), visibility 0.4s;
}
#menu-overlay.open { opacity: 1; visibility: visible; transform: translateY(0); }

.reveal-section {
  opacity: 0;
  transform: translateY(30px);
  transition: opacity 1.2s cubic-bezier(0.16, 1, 0.3, 1), transform 1.2s cubic-bezier(0.16, 1, 0.3, 1);
}
.reveal-section.active { opacity: 1; transform: translateY(0); }

.minimal-input {
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--line);
  border-radius: 0;
  padding: 1rem 0;
  color: var(--text);
  transition: border-color 0.4s ease;
  font-weight: 300;
}
.minimal-input:focus { outline: none; border-color: var(--accent); }

.skill-item { transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), color 0.3s ease; }
.skill-item:hover { transform: translateX(8px); color: var(--accent); }

.stat-box { border: 1px solid var(--line); transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
.stat-box:hover { border-color: var(--accent); transform: translateY(-4px); background-color: rgba(221, 160, 173, 0.02); }
</style>
</head>
<body class="selection:bg-[var(--accent)] selection:text-white">

<div id="custom-cursor" class="hidden lg:block opacity-0"></div>
<div id="custom-cursor-ring" class="hidden lg:block opacity-0"></div>

<nav class="fixed top-0 w-full z-50 px-6 md:px-16 py-6 border-b border-[rgba(28,20,23,0.04)] dark:border-[rgba(243,236,239,0.04)] backdrop-blur-md transition-all duration-500" style="background-color: var(--nav-bg);">
<div class="max-w-7xl mx-auto flex justify-between items-center">
  <a href="#top" class="text-md font-light tracking-[0.25em] uppercase hover-target">M.D</a>
  <div class="flex items-center gap-8">
    <div class="flex gap-2.5 text-[10px] tracking-[0.2em] font-medium">
      <button onclick="setLanguage('fr')" class="lang-btn hover-target opacity-100 transition font-semibold" id="lang-fr">FR</button>
      <span class="opacity-20">|</span>
      <button onclick="setLanguage('en')" class="lang-btn hover-target opacity-40 transition" id="lang-en">EN</button>
      <span class="opacity-20">|</span>
      <button onclick="setLanguage('nl')" class="lang-btn hover-target opacity-40 transition" id="lang-nl">NL</button>
    </div>
    <button onclick="toggleTheme()" aria-label="Toggle Theme" class="p-1 hover:opacity-60 transition hover-target">
      <svg id="themeIcon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/></svg>
    </button>
    <button onclick="toggleMenu()" class="burger-btn flex flex-col justify-between w-6 h-3.5 z-50 hover-target focus:outline-none" aria-label="Menu">
      <span id="burger-line-1" class="w-full h-[1px] bg-[var(--text)] transition-all duration-300 origin-left"></span>
      <span id="burger-line-2" class="w-full h-[1px] bg-[var(--text)] transition-all duration-300 origin-left mt-[5px]"></span>
    </button>
  </div>
</div>
</nav>

<div id="menu-overlay" class="fixed inset-0 z-40 flex flex-col justify-center px-6 md:px-20" style="background-color: var(--bg);">
<div class="max-w-4xl mx-auto w-full flex flex-col md:flex-row justify-between items-start md:items-center gap-12">
  <nav class="flex flex-col gap-5 text-2xl md:text-4xl font-light">
    <a href="#parcours" onclick="toggleMenu()" class="hover-target hover:text-[var(--accent)] transition-colors" data-i18n="nav-parcours">Mon Parcours</a>
    <a href="#projets" onclick="toggleMenu()" class="hover-target hover:text-[var(--accent)] transition-colors" data-i18n="nav-projets">Mes Projets</a>
    <a href="#competences" onclick="toggleMenu()" class="hover-target hover:text-[var(--accent)] transition-colors" data-i18n="nav-competences">Compétences & Outils</a>
    <a href="#certifications" onclick="toggleMenu()" class="hover-target hover:text-[var(--accent)] transition-colors" data-i18n="nav-certs">Certifications</a>
    <a href="#contact" onclick="toggleMenu()" class="hover-target hover:text-[var(--accent)] transition-colors" data-i18n="nav-contact">Recrutement & Collaboration</a>
  </nav>
</div>
</div>

<main id="top" class="min-h-screen flex flex-col justify-center px-6 md:px-16 pt-32">
<div class="max-w-5xl mx-auto w-full">
  <h1 class="text-[clamp(2.3rem,7vw,5.5rem)] font-extralight leading-[1.05] tracking-tight mb-4">Mélanie Dupriez</h1>
  <p class="text-[clamp(1.1rem,3vw,1.8rem)] font-light mb-12" style="color: var(--text-muted)">Business Data Analyst · <span class="serif italic" data-i18n="hero-subtitle-serif">Ingénieure de gestion</span></p>
</div>
</main>

<section id="competences" class="px-6 md:px-16 py-36 max-w-5xl mx-auto reveal-section">
<div class="grid grid-cols-1 md:grid-cols-3 gap-12 border-t border-[var(--line)] pt-16">
  <div><h2 class="text-[11px] uppercase tracking-[0.25em] font-semibold sticky top-32" style="color: var(--text-muted)" data-i18n="section-03">03 / COMPETENCES</h2></div>
  <div class="md:col-span-2 space-y-20">
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-12">
      <div>
        <h4 class="text-[11px] uppercase tracking-[0.15em] font-bold mb-8" style="color: var(--text-muted)" data-i18n="skills-tech">Outils</h4>
        <ul class="space-y-4 text-[14px] font-light">
          <li class="skill-item hover-target">Python</li>
          <li class="skill-item hover-target" data-i18n="skill-sql-model">SQL & Modélisation</li>
          <li class="skill-item hover-target">Power BI</li>
          <li class="skill-item hover-target">Tableau</li>
          <li class="skill-item hover-target">Excel</li>
        </ul>
      </div>
    </div>
  </div>
</div>
</section>

<script>
const translations = {
  fr: {
    "nav-parcours": "Mon Parcours",
    "nav-projets": "Mes Projets",
    "nav-competences": "Compétences & Outils",
    "nav-certs": "Certifications",
    "nav-contact": "Recrutement & Collaboration",
    "hero-subtitle-serif": "Ingénieure de gestion",
    "section-03": "03 / COMPETENCES",
    "skills-tech": "Outils",
    "skill-sql-model": "SQL & Modélisation"
  },
  en: {
    "nav-parcours": "My Path",
    "nav-projets": "My Projects",
    "nav-competences": "Skills & Tools",
    "nav-certs": "Certifications",
    "nav-contact": "Recruitment & Contact",
    "hero-subtitle-serif": "Business Engineer",
    "section-03": "03 / SKILLS",
    "skills-tech": "Tools",
    "skill-sql-model": "SQL & Modeling"
  },
  nl: {
    "nav-parcours": "Mijn Traject",
    "nav-projets": "Mijn Projecten",
    "nav-competences": "Expertise & Tools",
    "nav-certs": "Certificeringen",
    "nav-contact": "Werving & Contact",
    "hero-subtitle-serif": "Handelsingenieur",
    "section-03": "03 / EXPERTISE",
    "skills-tech": "Tools",
    "skill-sql-model": "SQL & Modellering"
  }
};

let currentLang = 'fr';
function setLanguage(lang) {
  currentLang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (translations[lang] && translations[lang][key]) {
      el.innerHTML = translations[lang][key];
    }
  });
}

function toggleMenu() {
  const overlay = document.getElementById('menu-overlay');
  overlay.classList.toggle('open');
}

function toggleTheme() {
  document.documentElement.classList.toggle('dark');
}
</script>
</body>
</html>
